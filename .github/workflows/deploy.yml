name: Deploy to GCE

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Rsync frontend build
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete
          path: frontend/dist/
          remote_path: /opt/zoiko-one/frontend/dist/
          remote_host: ${{ secrets.SSH_HOST }}
          remote_user: ${{ secrets.SSH_USER }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Rsync backend
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete --exclude=.env --exclude=venv
          path: backend/
          remote_path: /opt/zoiko-one/backend/
          remote_host: ${{ secrets.SSH_HOST }}
          remote_user: ${{ secrets.SSH_USER }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Rsync nginx config
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete
          path: nginx/
          remote_path: /opt/zoiko-one/nginx/
          remote_host: ${{ secrets.SSH_HOST }}
          remote_user: ${{ secrets.SSH_USER }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Install deps & restart backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            /opt/zoiko-one/backend/venv/bin/pip install -r /opt/zoiko-one/backend/api/requirements.txt
            sudo cp /opt/zoiko-one/nginx/zoiko-one.conf /etc/nginx/sites-available/zoiko-one.conf
            sudo ln -sf /etc/nginx/sites-available/zoiko-one.conf /etc/nginx/sites-enabled/zoiko-one.conf
            sudo systemctl restart zoiko-backend
            sudo systemctl reload nginx
            sudo systemctl status zoiko-backend --no-pager
